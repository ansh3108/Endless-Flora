<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endless Flora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="vignette"></div>
    
    <div id="ui">
        Depth: <span id="depth">0</span>px 
        <div class="divider"></div>
        Share: <input id="shareUrl" readonly>
    </div>

    <button id="guide-toggle">📖 Field Guide</button>

    <div id="field-guide">
        <div class="guide-header">
            <h2>Discovered Flora</h2>
            <button id="guide-close">×</button>
        </div>
        <div id="guide-list"></div>
    </div>

    <div id="toast">
        <div id="toast-title">Entering</div>
        <div id="toast-name">The Canopy</div>
    </div>

    <canvas id="stage"></canvas>
    <script src="script.js"></script>
</body>
</html>
